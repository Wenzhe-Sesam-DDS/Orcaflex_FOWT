[pytest]
# faulthandler must be disabled: OrcFxAPI internally raises (and catches)
# x87 FPU invalid-operation signals during heavy numeric work; pytest's
# faulthandler intercepts these signals and aborts the test session with
# "Windows fatal exception: code 0xc0000090" even though OrcFxAPI handles
# them gracefully.
addopts = -p no:faulthandler
testpaths = tests
